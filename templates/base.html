<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if title %}{{ title }} — ƒink{% else %}ƒink{% endif %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/hack-font@3/build/web/hack.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ root }}favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ root }}favicon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ root }}apple-touch-icon.png">

  <!-- Open Graph / social preview -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="ƒink">
  <meta property="og:title" content="{% if title %}{{ title }} — ƒink{% else %}ƒink{% endif %}">
  <meta property="og:description" content="A functional language that compiles to WasmGC.">
  <meta property="og:image" content="https://fink-lang.org/social.png">
  <meta property="og:url" content="https://fink-lang.org/">

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{% if title %}{{ title }} — ƒink{% else %}ƒink{% endif %}">
  <meta name="twitter:description" content="A functional language that compiles to WasmGC.">
  <meta name="twitter:image" content="https://fink-lang.org/social.png">

  <meta name="description" content="A functional language that compiles to WasmGC.">
  <link rel="stylesheet" href="{{ root }}style.css">
  {% block head %}{% endblock head %}
  <script>
    // Apply saved theme before first paint to avoid flash.
    (function() {
      var t = localStorage.getItem('theme') || 'system';
      if (t === 'dark') document.documentElement.style.colorScheme = 'dark';
      else if (t === 'light') document.documentElement.style.colorScheme = 'light';
    })();
  </script>
</head>
<body>
  <header>
    <nav>
      <a class="wordmark" href="{{ root }}"><img src="{{ root }}logo.png" alt="" class="wordmark-logo">ƒink</a>
      <a href="{{ root }}docs/">docs</a>
      <a href="https://github.com/fink-lang" class="nav-icon" aria-label="GitHub"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg></a>
      <div class="theme-picker">
        <button class="theme-toggle" aria-label="Toggle theme" title="Theme">
          <!-- half sun / half moon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3V1m0 22v-2m9-9h2M1 12h2m15.07-6.07 1.41-1.41M4.22 19.78l1.41-1.41m12.73 1.41 1.41 1.41M4.22 4.22 5.64 5.64"/>
            <path d="M12 7a5 5 0 0 1 0 10z" fill="currentColor"/>
            <path d="M12 7a5 5 0 0 0 0 10z"/>
          </svg>
        </button>
        <div class="theme-menu">
          <button data-theme="system">System</button>
          <button data-theme="light">Light</button>
          <button data-theme="dark">Dark</button>
        </div>
      </div>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock content %}
  </main>
  {% block footer %}
  <footer>
    <p>ƒink — <a href="https://github.com/fink-lang">github.com/fink-lang</a></p>
  </footer>
  {% endblock footer %}
  <script>
    (function() {
      var btn = document.querySelector('.theme-toggle');
      var menu = document.querySelector('.theme-menu');
      var current = localStorage.getItem('theme') || 'system';

      function apply(mode) {
        current = mode;
        localStorage.setItem('theme', mode);
        if (mode === 'dark') document.documentElement.style.colorScheme = 'dark';
        else if (mode === 'light') document.documentElement.style.colorScheme = 'light';
        else document.documentElement.style.colorScheme = '';
        updateActive();
      }

      function updateActive() {
        menu.querySelectorAll('button').forEach(function(b) {
          b.classList.toggle('active', b.dataset.theme === current);
        });
      }

      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        menu.classList.toggle('open');
      });

      menu.addEventListener('click', function(e) {
        var theme = e.target.dataset.theme;
        if (theme) { apply(theme); menu.classList.remove('open'); }
      });

      document.addEventListener('click', function() {
        menu.classList.remove('open');
      });

      updateActive();
    })();
  </script>
</body>
</html>
