<!DOCTYPE html>
<!-- Playground shell — embeds the fink-lang/playground fragment artifact.
     Provides the --fink-editor-* CSS variables, monaco.css, and Hack font
     as required by the fragment contract (see fink-lang/playground src/index.html).
     The fragment is fetched from /playground/fragment.html and injected at runtime. -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playground — ƒink</title>
  <link rel="icon" type="image/png" sizes="32x32" href="{{ root }}favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ root }}favicon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ root }}apple-touch-icon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/hack-font@3/build/web/hack.css">
  <link rel="stylesheet" href="/playground/monaco.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── fink editor theme variables ── */
    :root {
      --fink-editor-bg:           #1e1e1e;
      --fink-editor-fg:           #cccccc;
      --fink-editor-fg-dim:       #858585;
      --fink-editor-surface:      #252526;
      --fink-editor-border:       #3e3e42;
      --fink-editor-btn-bg:       #0e639c;
      --fink-editor-btn-hover:    #1177bb;
      --fink-editor-ok:           #4ec9b0;
      --fink-editor-err:          #f44747;

      --fink-editor-color-fn:       #DCDCAA;
      --fink-editor-color-ident:    #4FC1FF;
      --fink-editor-color-rec-key:  #9CDCFE;
      --fink-editor-color-tag:      #569CD6;
      --fink-editor-color-block:    #4FC1FF;
      --fink-editor-color-keyword:  #569CD6;
      --fink-editor-color-control:  #C586C0;
      --fink-editor-color-operator: #D4D4D4;
      --fink-editor-color-number:   #B5CEA8;
      --fink-editor-color-string:   #CE9178;
      --fink-editor-color-escape:   #D7BA7D;
      --fink-editor-color-comment:  #6A9955;
      --fink-editor-color-invalid:  #F44747;
      --fink-editor-color-bracket:  #BDBB85;
      --fink-editor-color-bracket2: #CC76D1;
      --fink-editor-color-bracket3: #4A9DF8;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--fink-editor-bg);
      color: var(--fink-editor-fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
  </style>
</head>
<body style="height:100%;display:flex;flex-direction:column">
  <header style="display:flex;align-items:center;gap:10px;padding:0 14px;height:36px;background:var(--fink-editor-surface);border-bottom:1px solid var(--fink-editor-border);flex-shrink:0">
    <a href="{{ root }}" style="display:flex;align-items:center;gap:6px;text-decoration:none;color:var(--fink-editor-fg-dim);font-size:13px">
      <img src="{{ root }}favicon-192.png" alt="" height="18">ƒink
    </a>
    <span style="font-size:13px;font-weight:600;color:var(--fink-editor-fg)">Playground</span>
  </header>
  <div id="playground-mount" style="flex:1;min-height:0">
    <script>
      fetch('/playground/fragment.html').then(r => r.text()).then(html => {
        const mount = document.getElementById('playground-mount')
        mount.innerHTML = html
        for (const s of mount.querySelectorAll('script')) {
          const ns = document.createElement('script')
          if (s.type) ns.type = s.type
          if (s.src) ns.src = s.src
          else ns.textContent = s.textContent
          s.replaceWith(ns)
        }
      })
    </script>
  </div>
</body>
</html>
