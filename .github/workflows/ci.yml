# Build and deploy the fink-lang.org website.
#
# On every push / PR: build and verify output exists.
# On push to main: also deploy to GitHub Pages.
#
# The fink compiler is checked out side-by-side from main
# to satisfy the path dependency in Cargo.toml.

name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out website
        uses: actions/checkout@v4
        with:
          path: website

      - name: Check out fink compiler
        uses: actions/checkout@v4
        with:
          repository: fink-lang/fink
          ref: main
          path: fink

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('website/Cargo.lock') }}

      - name: Build site
        working-directory: website
        run: cargo run --release

      - name: Download playground artifact
        # Downloads the pre-built playground tarball from fink-lang/playground releases
        # and extracts it into build/playground/. The website shell (templates/playground.html)
        # fetches fragment.html at runtime — no patching required.
        run: |
          mkdir -p website/build/playground
          curl -sL https://github.com/fink-lang/playground/releases/download/v1.7.1/playground.tar.gz \
            | tar -xzf - -C website/build/playground --exclude='./index.html'

      - name: Verify output
        working-directory: website
        run: |
          test -f build/index.html
          test -f build/docs/index.html
          test -f build/404.html
          test -f build/CNAME
          test -f build/playground/index.html
          test -f build/playground/fragment.html

      - name: Upload pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
